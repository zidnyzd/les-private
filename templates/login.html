<!DOCTYPE html>
<html lang="id" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk — Les Private</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.35.0/dist/tabler-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f5f6fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { width: 100%; max-width: 400px; padding: 1rem; }
        .card-custom { border: none; border-radius: .75rem; box-shadow: 0 0 0 1px rgba(0,0,0,.04), 0 1px 3px rgba(0,0,0,.04); }
        .brand-icon { font-size: 2.5rem; color: #2c7be5; }
        [data-bs-theme="dark"] body { background: #16181b; }
        [data-bs-theme="dark"] .card-custom { background: #1e2024; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="card card-custom p-4">
            <div class="text-center mb-4">
                <div class="brand-icon mb-2"><i class="ti ti-book"></i></div>
                <h4 class="fw-bold">Les Private</h4>
                <p class="text-muted small">Masuk ke akun Anda</p>
            </div>
            {{if .Error}}
            <div class="alert alert-danger py-2 small">{{.Error}}</div>
            {{end}}
            <form method="POST" action="/login">
                <div class="mb-3">
                    <label class="form-label small fw-medium">Nama Pengguna</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-medium">Kata Sandi</label>
                    <div class="input-group">
                        <input type="password" name="password" id="login-password" class="form-control" required>
                        <button type="button" class="btn btn-outline-secondary" onclick="togglePW('login-password',this)" tabindex="-1"><i class="ti ti-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100"><i class="ti ti-login"></i> Masuk</button>
            </form>
            <div class="text-center mt-3">
                <a href="/register" class="text-muted small text-decoration-none">Belum punya akun? Daftar</a>
            </div>
        </div>
    </div>
    <script>
        function togglePW(id,btn){var inp=document.getElementById(id);if(inp.type==='password'){inp.type='text';btn.innerHTML='<i class="ti ti-eye-off"></i>';}else{inp.type='password';btn.innerHTML='<i class="ti ti-eye"></i>';}}
        (function(){var t=localStorage.getItem('bsTheme');if(t)document.documentElement.setAttribute('data-bs-theme',t);else if(window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-bs-theme','dark');})();
    </script>
</body>
</html>
