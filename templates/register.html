<!DOCTYPE html>
<html lang="id" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar — Les Private</title>
    <link rel="manifest" href="/static/manifest.json?v=3">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="LesPrivate">
    <link rel="apple-touch-icon" href="/static/icon-192x192.png?v=3">
    <link rel="icon" type="image/png" href="/static/favicon.png?v=3">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.35.0/dist/tabler-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f5f6fa; min-height: 100vh; display: flex; align-items: center; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0 0 1px rgba(0,0,0,.05), 0 8px 32px rgba(0,0,0,.08); }
        .logo-text { font-size: 1.5rem; font-weight: 700; color: #2c7be5; }
        [data-bs-theme="dark"] body { background: #16181b; }
        [data-bs-theme="dark"] .card { background: #1e2024; }
        [data-bs-theme="dark"] .form-control { background: #262a2e; border-color: #2c3035; color: #cfd4da; }
        [data-bs-theme="dark"] .form-label { color: #abb2bf; }
        [data-bs-theme="dark"] .text-muted { color: #8b95a5 !important; }
    </style>
</head>
<body>
    <div class="container" style="max-width:420px">
        <div class="text-center mb-4">
            <div class="logo-text">📚 Les Private</div>
            <p class="text-muted small mt-1">Buat akun baru (untuk orang tua)</p>
        </div>
        <div class="card p-4">
            {{if .Error}}
            <div class="alert alert-danger py-2 small">{{.Error}}</div>
            {{end}}
            <form method="POST" action="/register">
                <div class="mb-3">
                    <label class="form-label small">Nama Pengguna</label>
                    <input type="text" name="username" class="form-control" required placeholder="3-20 karakter, huruf/angka/underscore">
                </div>
                <div class="mb-3">
                    <label class="form-label small">Nama Tampilan</label>
                    <input type="text" name="display" class="form-control" required placeholder="Nama Anda">
                </div>
                <div class="mb-3">
                    <label class="form-label small">Kata Sandi</label>
                    <div class="input-group">
                        <input type="password" name="password" id="reg-password" class="form-control" required placeholder="Min 6 karakter">
                        <button type="button" class="btn btn-outline-secondary" onclick="togglePW('reg-password',this)" tabindex="-1"><i class="ti ti-eye"></i></button>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small">Konfirmasi Sandi</label>
                    <div class="input-group">
                        <input type="password" name="confirm" id="reg-confirm" class="form-control" required placeholder="Ketik ulang sandi">
                        <button type="button" class="btn btn-outline-secondary" onclick="togglePW('reg-confirm',this)" tabindex="-1"><i class="ti ti-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Daftar</button>
            </form>
        </div>
        <p class="text-center text-muted small mt-3">Sudah punya akun? <a href="/login">Masuk</a></p>
    </div>
    <script>
        function togglePW(id,btn){var inp=document.getElementById(id);if(inp.type==='password'){inp.type='text';btn.innerHTML='<i class="ti ti-eye-off"></i>';}else{inp.type='password';btn.innerHTML='<i class="ti ti-eye"></i>';}}
        (function(){var t=localStorage.getItem('bsTheme');if(t)document.documentElement.setAttribute('data-bs-theme',t);else if(window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-bs-theme','dark');})();
    </script>
</body>
</html>
